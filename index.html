<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>VU Meters</title>
<style>
  /* Compatible with old Chrome (~v76, end-of-life Chromeboxes):
     no clamp()/min()/max(), no aspect-ratio, no flex gap, no inset shorthand,
     no optional chaining, and SVG colors set via CSS classes (not var() in attributes). */
  :root{
    --cabinet-0:#0b0a08; --cabinet-1:#171310; --cabinet-hi:#221b14;
    --brass-hi:#d8b25e; --brass-lo:#5f4a22; --hud:#cdb98f;
  }
  body[data-theme="amber"]{
    --face-hi:#f3ead2; --face-lo:#e3d4b2;
    --ink:#1a1510; --oxblood:#9a1f17; --label:#5a4a30;
    --glow:rgba(242,178,74,.40);
  }
  body[data-theme="blue"]{
    --face-hi:#0e1722; --face-lo:#05090f;
    --ink:#d6ecff; --oxblood:#ff5a4d; --label:#6f93b8;
    --glow:rgba(64,156,255,.60);
    --brass-hi:#c2ccd6; --brass-lo:#39434d; --cabinet-hi:#10161e;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:radial-gradient(120% 90% at 50% -10%, var(--cabinet-hi) 0%, var(--cabinet-1) 45%, var(--cabinet-0) 100%);
    color:var(--hud);
    font-family:"Futura","Avenir Next","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden;
    display:flex; flex-direction:column;
  }
  #stage{flex:1;display:flex;align-items:center;justify-content:center;padding:2vw}
  .meter{
    position:relative;width:44vw;height:31vw;margin:0 1vw;
    border-radius:14px;padding:1.2vw;
    background:linear-gradient(145deg,var(--brass-hi),var(--brass-lo));
    box-shadow:0 1px 0 rgba(255,255,255,.25) inset,0 -2px 6px rgba(0,0,0,.5) inset,0 18px 40px rgba(0,0,0,.6),0 2px 4px rgba(0,0,0,.5);
  }
  .glass{
    position:relative;height:100%;border-radius:8px;overflow:hidden;
    background:radial-gradient(130% 120% at 50% 8%, var(--face-hi) 0%, var(--face-lo) 78%, #cdb98e 100%);
    box-shadow:0 0 0 1px rgba(0,0,0,.35) inset,0 4px 18px rgba(0,0,0,.35) inset;
  }
  .lamp{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;
    background:radial-gradient(80% 60% at 50% 92%, var(--glow), transparent 70%);opacity:.8}
  body[data-theme="amber"] .lamp{mix-blend-mode:multiply}
  body[data-theme="blue"]  .lamp{mix-blend-mode:screen}
  .sheen{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;border-radius:8px;
    background:linear-gradient(135deg, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 28%)}
  svg{display:block;width:100%;height:100%;position:relative}

  /* SVG colors via CSS so the theme variables resolve (and recolor on toggle) */
  .ink-s{stroke:var(--ink)} .ink-f{fill:var(--ink)}
  .red-s{stroke:var(--oxblood)} .red-f{fill:var(--oxblood)}
  .brass-s{stroke:var(--brass-hi)} .brass-f{fill:var(--brass-hi)}

  .chan{position:absolute;left:0;right:0;bottom:7%;text-align:center;
    font-size:13px;letter-spacing:.42em;color:var(--label);font-weight:600}

  #bar{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;
    padding:14px 18px;background:rgba(0,0,0,.35);border-top:1px solid rgba(255,255,255,.05);
    transition:opacity .6s;font-size:13px}
  #bar.dim{opacity:0;pointer-events:none}
  #bar > *{margin:5px 9px}
  button{font:inherit;color:var(--hud);background:#241d15;cursor:pointer;
    border:1px solid #3a2f20;border-radius:8px;padding:9px 16px;letter-spacing:.04em}
  button:hover{background:#2e251a}
  button:focus{outline:2px solid #f2b24a;outline-offset:2px}
  .field{display:flex;align-items:center;white-space:nowrap}
  .field > *{margin:0 5px}
  input[type=range]{width:150px}
  #status{color:#9c8a66;font-size:12px;max-width:42vw}
  #status.err{color:#e1a06a}
</style>
</head>
<body data-theme="amber">
  <div id="stage"></div>
  <div id="bar">
    <button id="start">Start metering</button>
    <button id="theme">Backlight: Amber</button>
    <button id="full">Fullscreen</button>
    <span class="field">
      <label for="sens">Sensitivity</label>
      <input id="sens" type="range" min="-24" max="36" step="1" value="6">
      <span id="sensval">+6 dB</span>
    </span>
    <span class="field"><label><input id="peak" type="checkbox" checked> Peak hold</label></span>
    <span id="status">Tap “Start metering,” then allow the microphone.</span>
  </div>

<script>
(function(){
  "use strict";
  var A_MIN=-45, A_MAX=45, PIVOT={x:200,y:235}, RAD=188, ARC_R=168;
  var TICKS=[
    {v:"-20",t:0.00,big:true},{v:"-10",t:0.21,big:true},{v:"-7",t:0.33},
    {v:"-5",t:0.43},{v:"-3",t:0.55},{v:"-1",t:0.67},{v:"0",t:0.74,big:true},
    {v:"+1",t:0.82},{v:"+2",t:0.90},{v:"+3",t:1.00,big:true}
  ];
  var RED_START=0.74;
  function lerp(a,b,t){return a+(b-a)*t;}
  function tToAngle(t){return lerp(A_MIN,A_MAX,t);}
  function polar(cx,cy,r,deg){var a=(deg-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
  function arcPath(r,t0,t1){
    var p0=polar(PIVOT.x,PIVOT.y,r,tToAngle(t0)), p1=polar(PIVOT.x,PIVOT.y,r,tToAngle(t1));
    return "M "+p0[0].toFixed(1)+" "+p0[1].toFixed(1)+" A "+r+" "+r+" 0 0 1 "+p1[0].toFixed(1)+" "+p1[1].toFixed(1);
  }
  function buildFace(label){
    var ticks="",i,tk,ang,inp,outp,lp,red,cls;
    for(i=0;i<TICKS.length;i++){
      tk=TICKS[i]; ang=tToAngle(tk.t);
      red=tk.t>=RED_START-0.001;
      inp=polar(PIVOT.x,PIVOT.y,ARC_R-(tk.big?16:10),ang);
      outp=polar(PIVOT.x,PIVOT.y,ARC_R,ang);
      cls=red?"red-s":"ink-s";
      ticks+='<line class="'+cls+'" x1="'+inp[0].toFixed(1)+'" y1="'+inp[1].toFixed(1)+'" x2="'+outp[0].toFixed(1)+'" y2="'+outp[1].toFixed(1)+'" stroke-width="'+(tk.big?2.4:1.4)+'" stroke-linecap="round"/>';
      lp=polar(PIVOT.x,PIVOT.y,ARC_R-(tk.big?30:24),ang);
      ticks+='<text class="'+(red?"red-f":"ink-f")+'" x="'+lp[0].toFixed(1)+'" y="'+lp[1].toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-size="'+(tk.big?15:11)+'" font-weight="600">'+tk.v+'</text>';
    }
    return '<svg viewBox="0 0 400 288" preserveAspectRatio="xMidYMid meet">'
      + '<path class="ink-s" d="'+arcPath(ARC_R,0,RED_START)+'" fill="none" stroke-width="2.6"/>'
      + '<path class="red-s" d="'+arcPath(ARC_R,RED_START,1)+'" fill="none" stroke-width="3.4"/>'
      + ticks
      + '<text class="ink-f" x="200" y="150" text-anchor="middle" font-size="22" letter-spacing="3" font-weight="700" opacity="0.85">VU</text>'
      + '<text class="ink-f" x="200" y="172" text-anchor="middle" font-size="9" letter-spacing="2" opacity="0.5">'+label+'</text>'
      + '<line class="peak red-s" x1="'+PIVOT.x+'" y1="'+PIVOT.y+'" x2="'+PIVOT.x+'" y2="'+(PIVOT.y-RAD+6)+'" stroke-width="2" stroke-linecap="round" opacity="0" transform="rotate('+A_MIN+' '+PIVOT.x+' '+PIVOT.y+')"/>'
      + '<g class="needle" transform="rotate('+A_MIN+' '+PIVOT.x+' '+PIVOT.y+')">'
      + '<line class="ink-s" x1="'+PIVOT.x+'" y1="'+(PIVOT.y+18)+'" x2="'+PIVOT.x+'" y2="'+(PIVOT.y-RAD)+'" stroke-width="2.4" stroke-linecap="round"/></g>'
      + '<circle class="brass-s" cx="'+PIVOT.x+'" cy="'+PIVOT.y+'" r="11" fill="#2a2118" stroke-width="1.5"/>'
      + '<circle class="brass-f" cx="'+PIVOT.x+'" cy="'+PIVOT.y+'" r="3.4"/>'
      + '</svg>';
  }

  var stage=document.getElementById("stage");
  function makeMeter(label){
    var wrap=document.createElement("div");
    wrap.className="meter";
    wrap.innerHTML='<div class="glass">'+buildFace(label)+'<div class="lamp"></div><div class="sheen"></div><div class="chan">'+label+'</div></div>';
    stage.appendChild(wrap);
    return {needle:wrap.querySelector(".needle"),peak:wrap.querySelector(".peak"),angle:A_MIN,vel:0,peakAngle:A_MIN};
  }
  var meters=[makeMeter("LEFT"),makeMeter("RIGHT")];

  var ctx,analysers=[],buffers=[],running=false,mono=false;
  var sens=document.getElementById("sens"),sensVal=document.getElementById("sensval");
  var peakOn=document.getElementById("peak"),statusEl=document.getElementById("status");
  function setStatus(msg,err){statusEl.textContent=msg;statusEl.className=err?"err":"";}
  sens.addEventListener("input",function(){sensVal.textContent=(sens.value>=0?"+":"")+sens.value+" dB";});

  function start(){
    if(running)return;
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      setStatus("This browser is too old for microphone capture (needs a newer Chrome).",true);return;
    }
    var constraints={audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,channelCount:2},video:false};
    navigator.mediaDevices.getUserMedia(constraints).then(function(stream){
      var AC=window.AudioContext||window.webkitAudioContext;
      ctx=new AC(); if(ctx.resume){ctx.resume();}
      var src=ctx.createMediaStreamSource(stream);
      var tr=stream.getAudioTracks()[0];
      var settings=tr.getSettings?tr.getSettings():{};
      mono=(settings.channelCount||1)<2;
      var splitter=ctx.createChannelSplitter(2);
      src.connect(splitter);
      for(var i=0;i<2;i++){
        var an=ctx.createAnalyser(); an.fftSize=1024; an.smoothingTimeConstant=0;
        splitter.connect(an,mono?0:i);
        analysers[i]=an; buffers[i]=new Float32Array(an.fftSize);
      }
      running=true;
      setStatus(mono?"Running — input is MONO, both meters track the same signal. Use a stereo line-in for true L/R."
                    :"Running — set Sensitivity so loud passages just kiss 0 VU.",false);
      document.getElementById("start").textContent="Metering…";
      last=now(); loop();
    }).catch(function(e){ setStatus("No microphone access: "+e.message,true); });
  }

  var STIFF=230,DAMP=26;
  function now(){return (window.performance&&performance.now)?performance.now():Date.now();}
  var last=now();
  function rmsToAngle(rms){
    var db=20*Math.log(rms+1e-9)/Math.LN10+Number(sens.value);
    var t=(db+20)/23; if(t<0)t=0; if(t>1)t=1; return tToAngle(t);
  }
  function loop(){
    var n=now(),dt=(n-last)/1000; last=n; if(dt>0.05)dt=0.05;
    for(var i=0;i<2;i++){
      analysers[i].getFloatTimeDomainData(buffers[i]);
      var b=buffers[i],sum=0,k; for(k=0;k<b.length;k++){sum+=b[k]*b[k];}
      var rms=Math.sqrt(sum/b.length),target=rmsToAngle(rms),m=meters[i];
      var acc=STIFF*(target-m.angle)-DAMP*m.vel;
      m.vel+=acc*dt; m.angle+=m.vel*dt;
      if(m.angle<A_MIN){m.angle=A_MIN;m.vel=0;}
      if(m.angle>A_MAX){m.angle=A_MAX;m.vel*=-0.2;}
      m.needle.setAttribute("transform","rotate("+m.angle.toFixed(2)+" "+PIVOT.x+" "+PIVOT.y+")");
      if(peakOn.checked){
        if(m.angle>m.peakAngle){m.peakAngle=m.angle;} else {m.peakAngle=Math.max(A_MIN,m.peakAngle-18*dt);}
        m.peak.setAttribute("opacity",m.peakAngle>A_MIN+0.5?"0.9":"0");
        m.peak.setAttribute("transform","rotate("+m.peakAngle.toFixed(2)+" "+PIVOT.x+" "+PIVOT.y+")");
      } else { m.peak.setAttribute("opacity","0"); }
    }
    requestAnimationFrame(loop);
  }

  document.getElementById("start").addEventListener("click",start);
  var themeBtn=document.getElementById("theme");
  themeBtn.addEventListener("click",function(){
    var toBlue=document.body.getAttribute("data-theme")==="amber";
    document.body.setAttribute("data-theme",toBlue?"blue":"amber");
    themeBtn.textContent="Backlight: "+(toBlue?"McIntosh blue":"Amber");
  });
  document.getElementById("full").addEventListener("click",function(){
    var el=document.documentElement;
    if(!document.fullscreenElement){ if(el.requestFullscreen){el.requestFullscreen();} else if(el.webkitRequestFullscreen){el.webkitRequestFullscreen();} }
    else { if(document.exitFullscreen){document.exitFullscreen();} else if(document.webkitExitFullscreen){document.webkitExitFullscreen();} }
  });

  var bar=document.getElementById("bar"),hideT;
  function poke(){ bar.className=""; clearTimeout(hideT); hideT=setTimeout(function(){ if(running){bar.className="dim";} },4000); }
  var evs=["mousemove","keydown","touchstart","click"],e;
  for(e=0;e<evs.length;e++){ window.addEventListener(evs[e],poke); }
  poke();
})();
</script>
</body>
</html>
