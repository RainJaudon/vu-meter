<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>VU Meters</title>
<style>
  :root{
    --cabinet-0:#0b0a08;
    --cabinet-1:#171310;
    --face-hi:#f3ead2;
    --face-lo:#e3d4b2;
    --amber:#f2b24a;          /* incandescent backlight */
    --amber-soft:#caa24f;
    --ink:#1a1510;            /* needle + scale ink */
    --oxblood:#9a1f17;        /* overload zone */
    --brass-hi:#d8b25e;
    --brass-lo:#5f4a22;
    --hud:#cdb98f;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:
      radial-gradient(120% 90% at 50% -10%, #221b14 0%, var(--cabinet-1) 45%, var(--cabinet-0) 100%);
    color:var(--hud);
    font-family:"Futura","Avenir Next","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  /* faint wood-grain veneer on the cabinet */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.06;
    background:repeating-linear-gradient(92deg,#000 0 2px,transparent 2px 7px);
    mix-blend-mode:overlay;
  }

  #stage{
    flex:1;display:flex;align-items:center;justify-content:center;
    gap:clamp(16px,4vw,64px);
    padding:clamp(16px,4vw,56px);
  }

  .meter{
    position:relative;
    width:min(44vw,640px);
    aspect-ratio:1 / 0.72;
    border-radius:14px;
    /* brass bezel */
    padding:clamp(10px,1.4vw,20px);
    background:
      linear-gradient(145deg,var(--brass-hi),var(--brass-lo));
    box-shadow:
      0 1px 0 rgba(255,255,255,.25) inset,
      0 -2px 6px rgba(0,0,0,.5) inset,
      0 18px 40px rgba(0,0,0,.6),
      0 2px 4px rgba(0,0,0,.5);
  }
  .glass{
    position:relative;height:100%;border-radius:8px;overflow:hidden;
    background:
      radial-gradient(130% 120% at 50% 8%, var(--face-hi) 0%, var(--face-lo) 78%, #cdb98e 100%);
    box-shadow:0 0 0 1px rgba(0,0,0,.35) inset, 0 4px 18px rgba(0,0,0,.35) inset;
  }
  /* warm lamp glow from behind the face */
  .glass::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(80% 60% at 50% 92%, rgba(242,178,74,.40), rgba(242,178,74,0) 70%);
    mix-blend-mode:multiply;opacity:.7;
  }
  /* glass reflection */
  .glass::after{
    content:"";position:absolute;inset:0;pointer-events:none;border-radius:8px;
    background:linear-gradient(135deg, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 28%);
  }
  svg{display:block;width:100%;height:100%}
  .chan{
    position:absolute;left:0;right:0;bottom:7%;text-align:center;
    font-size:clamp(10px,1.1vw,14px);letter-spacing:.42em;
    color:#5a4a30;font-weight:600;
  }

  /* ---- control bar ---- */
  #bar{
    display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;
    padding:14px 18px;background:rgba(0,0,0,.35);
    border-top:1px solid rgba(255,255,255,.05);
    transition:opacity .6s;font-size:13px;
  }
  #bar.dim{opacity:0;pointer-events:none}
  button{
    font:inherit;color:var(--hud);background:#241d15;cursor:pointer;
    border:1px solid #3a2f20;border-radius:8px;padding:9px 16px;letter-spacing:.04em;
  }
  button:hover{background:#2e251a}
  button:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .field{display:flex;align-items:center;gap:9px;white-space:nowrap}
  input[type=range]{accent-color:var(--amber);width:160px}
  #status{min-width:0;color:#9c8a66;font-size:12px}
  #status.err{color:#e1a06a}
  kbd{background:#2a2218;border:1px solid #3a2f20;border-radius:4px;padding:1px 6px;font-size:11px}
</style>
</head>
<body>
  <div id="stage">
    <!-- meters injected here -->
  </div>

  <div id="bar">
    <button id="start">Start metering</button>
    <button id="full">Fullscreen</button>
    <div class="field">
      <label for="sens">Sensitivity</label>
      <input id="sens" type="range" min="-24" max="36" step="1" value="6">
      <span id="sensval">+6 dB</span>
    </div>
    <div class="field"><label><input id="peak" type="checkbox" checked> Peak hold</label></div>
    <span id="status">Tap “Start metering,” then allow the microphone. Bar hides on its own — move the mouse to bring it back.</span>
  </div>

<script>
(() => {
  "use strict";

  // ---------- build a meter face as SVG ----------
  // Geometry: needle pivots near bottom-center, sweeps a shallow arc.
  const A_MIN = -45, A_MAX = 45;            // needle angle range (deg) low->high
  const PIVOT = {x:200, y:235};            // in a 400x288 viewBox
  const RAD = 188;                          // needle length to scale
  const ARC_R = 168;                        // printed arc radius

  // Standard VU scale: label -> position 0..1 along the scale (nonlinear, authentic)
  const TICKS = [
    {v:"-20", t:0.00, big:true},
    {v:"-10", t:0.21, big:true},
    {v:"-7",  t:0.33},
    {v:"-5",  t:0.43},
    {v:"-3",  t:0.55},
    {v:"-1",  t:0.67},
    {v:"0",   t:0.74, big:true},
    {v:"+1",  t:0.82},
    {v:"+2",  t:0.90},
    {v:"+3",  t:1.00, big:true},
  ];
  const RED_START = 0.74; // overload zone begins at 0 VU

  const lerp = (a,b,t)=>a+(b-a)*t;
  const tToAngle = t => lerp(A_MIN, A_MAX, t);
  const polar = (cx,cy,r,deg)=>{const a=(deg-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];};

  function arcPath(r, t0, t1){
    const [x0,y0]=polar(PIVOT.x,PIVOT.y,r,tToAngle(t0));
    const [x1,y1]=polar(PIVOT.x,PIVOT.y,r,tToAngle(t1));
    return `M ${x0.toFixed(1)} ${y0.toFixed(1)} A ${r} ${r} 0 0 1 ${x1.toFixed(1)} ${y1.toFixed(1)}`;
  }

  function buildFace(label){
    let ticks = "";
    for(const tk of TICKS){
      const ang = tToAngle(tk.t);
      const [ix,iy]=polar(PIVOT.x,PIVOT.y,ARC_R-(tk.big?16:10),ang);
      const [ox,oy]=polar(PIVOT.x,PIVOT.y,ARC_R,ang);
      const red = tk.t>=RED_START-0.001;
      ticks += `<line x1="${ix.toFixed(1)}" y1="${iy.toFixed(1)}" x2="${ox.toFixed(1)}" y2="${oy.toFixed(1)}"
                 stroke="${red?'var(--oxblood)':'var(--ink)'}" stroke-width="${tk.big?2.4:1.4}" stroke-linecap="round"/>`;
      const [lx,ly]=polar(PIVOT.x,PIVOT.y,ARC_R-(tk.big?30:24),ang);
      ticks += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle"
                 font-size="${tk.big?15:11}" font-weight="600"
                 fill="${red?'var(--oxblood)':'var(--ink)'}">${tk.v}</text>`;
    }
    return `
    <svg viewBox="0 0 400 288" preserveAspectRatio="xMidYMid meet">
      <!-- baseline arc -->
      <path d="${arcPath(ARC_R, 0, RED_START)}" fill="none" stroke="var(--ink)" stroke-width="2.6"/>
      <path d="${arcPath(ARC_R, RED_START, 1)}" fill="none" stroke="var(--oxblood)" stroke-width="3.4"/>
      ${ticks}
      <text x="200" y="150" text-anchor="middle" font-size="22" letter-spacing="3"
            font-weight="700" fill="var(--ink)" opacity="0.85">VU</text>
      <text x="200" y="172" text-anchor="middle" font-size="9" letter-spacing="2"
            fill="var(--ink)" opacity="0.5">${label}</text>
      <!-- peak-hold marker -->
      <line class="peak" x1="${PIVOT.x}" y1="${PIVOT.y}" x2="${PIVOT.x}" y2="${PIVOT.y-RAD+6}"
            stroke="var(--oxblood)" stroke-width="2" stroke-linecap="round" opacity="0"
            transform="rotate(${A_MIN} ${PIVOT.x} ${PIVOT.y})"/>
      <!-- needle -->
      <g class="needle" transform="rotate(${A_MIN} ${PIVOT.x} ${PIVOT.y})">
        <line x1="${PIVOT.x}" y1="${PIVOT.y+18}" x2="${PIVOT.x}" y2="${PIVOT.y-RAD}"
              stroke="var(--ink)" stroke-width="2.4" stroke-linecap="round"/>
      </g>
      <circle cx="${PIVOT.x}" cy="${PIVOT.y}" r="11" fill="#2a2118"
              stroke="var(--brass-hi)" stroke-width="1.5"/>
      <circle cx="${PIVOT.x}" cy="${PIVOT.y}" r="3.4" fill="var(--brass-hi)"/>
    </svg>`;
  }

  // ---------- DOM ----------
  const stage = document.getElementById("stage");
  function makeMeter(label){
    const wrap = document.createElement("div");
    wrap.className = "meter";
    wrap.innerHTML = `<div class="glass">${buildFace(label)}<div class="chan">${label}</div></div>`;
    stage.appendChild(wrap);
    return {
      needle: wrap.querySelector(".needle"),
      peak:   wrap.querySelector(".peak"),
      angle:  A_MIN, vel:0, peakAngle:A_MIN,
    };
  }
  const meters = [ makeMeter("LEFT"), makeMeter("RIGHT") ];

  // ---------- audio ----------
  let ctx, raf, analysers = [], buffers = [], running=false, mono=false;
  const sens = document.getElementById("sens");
  const sensVal = document.getElementById("sensval");
  const peakOn = document.getElementById("peak");
  const statusEl = document.getElementById("status");

  function setStatus(msg, err=false){ statusEl.textContent = msg; statusEl.classList.toggle("err", err); }
  sens.addEventListener("input", () => sensVal.textContent = (sens.value>=0?"+":"")+sens.value+" dB");

  async function start(){
    if(running) return;
    try{
      // CRITICAL: disable the browser's voice processing or the needle will pump.
      const stream = await navigator.mediaDevices.getUserMedia({
        audio:{
          echoCancellation:false,
          noiseSuppression:false,
          autoGainControl:false,
          channelCount:2,
        }, video:false
      });

      ctx = new (window.AudioContext||window.webkitAudioContext)();
      await ctx.resume();
      const src = ctx.createMediaStreamSource(stream);
      const chCount = stream.getAudioTracks()[0].getSettings().channelCount || 1;
      mono = chCount < 2;

      const splitter = ctx.createChannelSplitter(2);
      src.connect(splitter);
      for(let i=0;i<2;i++){
        const an = ctx.createAnalyser();
        an.fftSize = 1024; an.smoothingTimeConstant = 0;
        // if input is mono, both meters read channel 0
        splitter.connect(an, mono ? 0 : i);
        analysers[i] = an;
        buffers[i] = new Float32Array(an.fftSize);
      }
      running = true;
      setStatus(mono
        ? "Running — input is MONO, so both meters track the same signal. Use a stereo line-in (see notes) for true L/R."
        : "Running — stereo. Set Sensitivity so loud passages just kiss 0 VU.");
      document.getElementById("start").textContent = "Metering…";
      loop();
    }catch(e){
      setStatus("No microphone access: " + e.message + ". On the Chromebox this page must be served over https:// (or localhost) for mic permission.", true);
    }
  }

  // VU-style ballistics: critically-damped needle, ~300 ms rise.
  const STIFF = 230, DAMP = 26;   // tuned for slight overshoot then settle
  let last = performance.now();

  function rmsToAngle(rms){
    const db = 20*Math.log10(rms + 1e-9) + Number(sens.value);
    // map roughly -20 VU .. +3 VU onto the scale
    let t = (db + 20) / 23;            // -20dB->0, +3dB->1
    t = Math.max(0, Math.min(1, t));
    return tToAngle(t);
  }

  function loop(){
    const now = performance.now();
    let dt = (now - last)/1000; last = now;
    dt = Math.min(dt, 0.05);

    for(let i=0;i<2;i++){
      analysers[i].getFloatTimeDomainData(buffers[i]);
      let sum=0; const b=buffers[i];
      for(let n=0;n<b.length;n++) sum += b[n]*b[n];
      const rms = Math.sqrt(sum/b.length);
      const target = rmsToAngle(rms);

      const m = meters[i];
      const a = STIFF*(target - m.angle) - DAMP*m.vel;
      m.vel += a*dt;
      m.angle += m.vel*dt;
      if(m.angle<A_MIN){m.angle=A_MIN;m.vel=0;}
      if(m.angle>A_MAX){m.angle=A_MAX;m.vel*=-0.2;}
      m.needle.setAttribute("transform", `rotate(${m.angle.toFixed(2)} ${PIVOT.x} ${PIVOT.y})`);

      if(peakOn.checked){
        if(m.angle > m.peakAngle) m.peakAngle = m.angle;
        else m.peakAngle = Math.max(A_MIN, m.peakAngle - 18*dt); // slow decay
        m.peak.setAttribute("opacity", m.peakAngle>A_MIN+0.5 ? "0.9":"0");
        m.peak.setAttribute("transform", `rotate(${m.peakAngle.toFixed(2)} ${PIVOT.x} ${PIVOT.y})`);
      }else{
        m.peak.setAttribute("opacity","0");
      }
    }
    raf = requestAnimationFrame(loop);
  }

  // ---------- ui chrome ----------
  document.getElementById("start").addEventListener("click", start);
  document.getElementById("full").addEventListener("click", () => {
    if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  });

  // auto-hide the control bar after inactivity
  const bar = document.getElementById("bar");
  let hideT;
  function poke(){
    bar.classList.remove("dim");
    clearTimeout(hideT);
    hideT = setTimeout(()=>{ if(running) bar.classList.add("dim"); }, 4000);
  }
  ["mousemove","keydown","touchstart","click"].forEach(ev=>window.addEventListener(ev,poke));
  poke();
})();
</script>
</body>
</html>
